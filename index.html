<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Military Intelligence Service | Live Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #05050a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .glass:hover { background: rgba(255, 255, 255, 0.05); }
        .edit-icon { display: none; cursor: pointer; color: #6366f1; margin-left: 8px; vertical-align: middle; }
        .admin-mode .edit-icon { display: inline-block; }
        .glow-text { text-shadow: 0 0 15px rgba(99, 102, 241, 0.4); }
    </style>

    <!-- Firebase System -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArIfIvKYaVNVZftvF_Sp9JLL2h05WTbI8",
            authDomain: "mis-terminal.firebaseapp.com",
            databaseURL: "https://mis-terminal-default-rtdb.firebaseio.com/",
            projectId: "mis-terminal",
            storageBucket: "mis-terminal.firebasestorage.app",
            messagingSenderId: "15268285800",
            appId: "1:15268285800:web:87214aa862eb9b78e61add"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const siteRef = ref(db, 'siteData');

        // Initial Data Structure if Database is empty
        const defaultData = {
            heroTitle: "Military Intelligence Service",
            heroDesc: "The eyes and ears of the British Army Academy.",
            stat1: "200+",
            stat2: "48",
            operations: {}
        };

        // Attach Firebase actions to the global window object
        window.saveField = (key, value) => {
            set(ref(db, `siteData/${key}`), value);
        };

        window.addOp = (newOp) => {
            push(ref(db, 'siteData/operations'), newOp);
        };

        window.deleteOpFromDb = (id) => {
            remove(ref(db, `siteData/operations/${id}`));
        };

        // Live Listener
        onValue(siteRef, (snapshot) => {
            const data = snapshot.val();
            window.siteData = data || defaultData;
            if (!data) set(siteRef, defaultData); // Initialize DB if empty
            renderAll();
        });
    </script>
</head>
<body class="p-4 md:p-8">

    <nav class="flex justify-between items-center max-w-6xl mx-auto mb-16">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i data-lucide="shield" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-sm font-bold uppercase tracking-widest">
                <span id="nav-title">MI Service</span>
                <i data-lucide="pencil" class="edit-icon w-3 h-3" onclick="editField('heroTitle')"></i>
            </h1>
        </div>
        <button id="auth-btn" onclick="handleAuth()" class="px-4 py-2 glass text-[10px] font-bold tracking-widest flex items-center gap-2 hover:bg-white/10">
            <i data-lucide="lock" class="w-3 h-3"></i> <span id="login-text">Operative Login</span>
        </button>
    </nav>

    <main class="max-w-6xl mx-auto">
        <header class="mb-12">
            <p class="mono text-indigo-500 text-[10px] mb-4 tracking-[0.3em] uppercase">// Classification: Top Secret</p>
            <h2 id="txt-hero-title" class="text-5xl md:text-7xl font-bold mb-6 glow-text tracking-tight">Loading...</h2>
            <p class="max-w-2xl text-gray-400 text-lg leading-relaxed">
                <span id="txt-hero-desc">Establishing secure uplink to terminal...</span>
                <i data-lucide="pencil" class="edit-icon w-4 h-4" onclick="editField('heroDesc')"></i>
            </p>
        </header>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-8 border-t border-white/10 pt-12 mb-20">
            <div>
                <h3 class="text-4xl font-bold text-indigo-500">
                    <span id="txt-stat-1">...</span>
                    <i data-lucide="pencil" class="edit-icon w-4 h-4" onclick="editField('stat1')"></i>
                </h3>
                <p class="text-[10px] text-gray-500 font-bold tracking-widest uppercase mt-2">Operations</p>
            </div>
            <div>
                <h3 class="text-4xl font-bold text-indigo-500">
                    <span id="txt-stat-2">...</span>
                    <i data-lucide="pencil" class="edit-icon w-4 h-4" onclick="editField('stat2')"></i>
                </h3>
                <p class="text-[10px] text-gray-500 font-bold tracking-widest uppercase mt-2">Active Operatives</p>
            </div>
        </div>

        <section>
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h3 class="mono text-indigo-500 text-xs tracking-widest uppercase">// Operations Registry</h3>
                    <p class="text-gray-500 text-[10px] uppercase mt-1">Live Feed - Restricted Access</p>
                </div>
                <button onclick="openOpModal()" class="admin-panel hidden bg-indigo-600 px-6 py-2 rounded text-[10px] font-bold tracking-widest hover:bg-indigo-500 transition">CREATE OPERATION</button>
            </div>
            <div id="op-container" class="grid gap-4">
                <!-- Data injected here -->
            </div>
        </section>
    </main>

    <script>
        let isAdmin = false;
        window.siteData = {};

        function handleAuth() {
            if (!isAdmin) {
                const pass = prompt("Enter Clearance Credentials:");
                if (pass === "misadmin") {
                    isAdmin = true;
                    document.body.classList.add('admin-mode');
                    document.querySelectorAll('.admin-panel').forEach(el => el.classList.remove('hidden'));
                    document.getElementById('login-text').innerText = "Logout";
                } else {
                    alert("ACCESS DENIED");
                }
            } else {
                isAdmin = false;
                document.body.classList.remove('admin-mode');
                document.querySelectorAll('.admin-panel').forEach(el => el.classList.add('hidden'));
                document.getElementById('login-text').innerText = "Operative Login";
            }
            renderAll();
        }

        function editField(key) {
            if (!isAdmin) return;
            const newVal = prompt(`Update ${key}:`, window.siteData[key]);
            if (newVal !== null) {
                window.saveField(key, newVal);
            }
        }

        function openOpModal() {
            if (!isAdmin) return;
            const title = prompt("Operation Name:");
            const desc = prompt("Mission Briefing:");
            if (title && desc) {
                window.addOp({ title, desc, timestamp: Date.now() });
            }
        }

        function deleteOp(id) {
            if (!isAdmin) return;
            if (confirm("Permanently delete this intelligence file?")) {
                window.deleteOpFromDb(id);
            }
        }

        function renderAll() {
            document.getElementById('txt-hero-title').innerText = window.siteData.heroTitle;
            document.getElementById('txt-hero-desc').innerText = window.siteData.heroDesc;
            document.getElementById('txt-stat-1').innerText = window.siteData.stat1;
            document.getElementById('txt-stat-2').innerText = window.siteData.stat2;

            const container = document.getElementById('op-container');
            const opsEntries = window.siteData.operations ? Object.entries(window.siteData.operations) : [];
            
            if (opsEntries.length === 0) {
                container.innerHTML = `<p class="text-gray-600 italic text-sm">No active operations in registry.</p>`;
            } else {
                container.innerHTML = opsEntries.map(([id, op]) => `
                    <div class="glass p-6 rounded flex justify-between items-center group">
                        <div>
                            <span class="text-[9px] mono text-indigo-500 tracking-tighter">// OP_ID: ${id.substring(1, 8)}</span>
                            <h4 class="font-bold uppercase text-xl tracking-tight mt-1">${op.title}</h4>
                            <p class="text-sm text-gray-400 mt-2 max-w-xl">${op.desc}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="px-2 py-1 bg-indigo-500/10 text-indigo-400 text-[10px] font-bold rounded border border-indigo-500/20">ACTIVE</span>
                            ${isAdmin ? `
                                <button onclick="deleteOp('${id}')" class="text-red-500/50 hover:text-red-500 transition">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `).reverse().join('');
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
